name = "echo-podcast"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "echo-podcast"
database_id = "47152c21-6ded-4102-891e-b4628250ac0f"

[[kv_namespaces]]
binding = "PC_CACHE"
id = "de6a39bb3f834a4e9a3ffa7537ba44f0"

[[r2_buckets]]
binding = "AUDIO"
bucket_name = "echo-prime-media"

[triggers]
crons = ["0 3 * * *"]

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"
